<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lap Pace Counter - Laptop</title>

  <style>
    /* ===== GLOBAL STYLING ===== */
    body {
      background: black;
      color: white;
      font-family: "Courier New", monospace;
      text-align: center;
      margin: 10px;
    }

    /* ===== TOP BAR (buttons + timer + selector) ===== */
    .top-bar {
      position: relative;
      width: 100%;
      height: 80px;
    }

    /* ===== TIMER (centered) ===== */
    #timer {
      position: absolute;
      left: 50%;
      transform: translate(-50%, 0);
      display: inline-flex;
      align-items: baseline;
    }

    /* Main time (MM:SS) */
    #mainTime {
      font-size: 6rem;
      color: orange;
      width: 6ch;
      text-align: right;
      font-weight: bold;
    }

    /* Decimal (.xx) */
    #decimal {
      font-size: 3rem;
      color: orange;
      width: 3ch;
      text-align: left;
      font-weight: bold;
    }

    /* ===== TRACK SELECTOR (right side) ===== */
    .track-wrapper {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
    }

    label {
      font-size: 1.5rem;
    }

    select {
      font-family: "Courier New", monospace;
      font-size: 1.4rem;
      padding: 8px 14px;
      border-radius: 8px;
      border: none;
      background: #222;
      color: white;
    }

    /* ===== BUTTONS (left side) ===== */
    .controls {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      gap: 6px;
    }

    button {
      font-size: 1.6rem;
      padding: 12px 26px;
      margin: 8px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-family: "Courier New", monospace;
      color: white;
    }

    #start { background: green; }
    #stop { background: red; }
    #reset { background: gray; }

    /* ===== GRID (2 columns: laps 1–5 and 6–10) ===== */
    #paceGrid {
      width: 95vw;
      max-width: 1400px;
      margin: 0 auto 30px auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
    }

    .paceColumn {
      background: #050505;
      padding: 1px 2px;
      border-radius: 10px;
    }

    /* ===== EACH LAP ROW ===== */
    .paceRow {
      display: flex;
      justify-content: space-between;
      align-items: center;
      white-space: nowrap;
      overflow: hidden;
      margin: 1px 0;
      padding: 2px 0;
      line-height: 0.8;
    }

    /* Alternate colors for readability */
    .paceRow:nth-child(odd) {
      color: red;
    }

    .paceRow:nth-child(even) {
      color: cyan;
    }

    /* Lap label (L1, L2, etc.) */
    .paceLap {
      flex: 0 0 auto;
      text-align: center;
      margin-right: 3px;
      font-size: 3rem;
    }

    /* Pace value (MAIN FOCUS → very large) */
    .paceValue {
      flex: 1;
      text-align: center;
      font-size: 9rem;
      font-weight: bold;
    }

    /* ===== MOBILE FALLBACK ===== */
    @media (max-width: 900px) {
      #paceGrid {
        grid-template-columns: 1fr;
      }

      #mainTime {
        font-size: 4.5rem;
      }

      #decimal {
        font-size: 2.2rem;
      }

      .paceLap {
        font-size: 1.5rem;
      }

      .paceValue {
        font-size: 2.2rem;
      }
    }
  </style>
</head>

<body>

  <!-- ===== TOP BAR ===== -->
  <div class="top-bar">

    <!-- LEFT: Controls -->
    <div class="controls">
      <button id="start">Start</button>
      <button id="stop">Stop</button>
      <button id="reset">Reset</button>
    </div>

    <!-- CENTER: Timer -->
    <div id="timer">
      <span id="mainTime">00:00</span>
      <span id="decimal">.00</span>
    </div>

    <!-- RIGHT: Track selector -->
    <div class="track-wrapper">
      <label for="trackSelect">Track:</label>
      <select id="trackSelect">
        <option value="200">200 m</option>
        <option value="400">400 m</option>
      </select>
    </div>

  </div>

  <!-- ===== LAP GRID ===== -->
  <div id="paceGrid">
    <div id="leftColumn" class="paceColumn"></div>
    <div id="rightColumn" class="paceColumn"></div>
  </div>

  <script>
    /* ===== STATE VARIABLES ===== */
    let running = false;              // Is timer running?
    let startTime = 0;               // Timestamp when started
    let elapsed = 0;                 // Elapsed time (seconds)
    let animationId = null;          // requestAnimationFrame ID
    let lastPaceUpdateSecond = -1;   // Used to limit updates to 1/sec

    /* ===== DOM REFERENCES ===== */
    const mainTimeEl = document.getElementById("mainTime");
    const decimalEl = document.getElementById("decimal");
    const trackSelect = document.getElementById("trackSelect");
    const leftColumn = document.getElementById("leftColumn");
    const rightColumn = document.getElementById("rightColumn");

    /* ===== FORMAT TIME (MM:SS.xx) ===== */
    function formatTime(sec) {
      const minutes = Math.floor(sec / 60);
      const seconds = Math.floor(sec % 60);
      const hundredths = Math.floor((sec % 1) * 100);

      return (
        String(minutes).padStart(2, "0") + ":" +
        String(seconds).padStart(2, "0") + "." +
        String(hundredths).padStart(2, "0")
      );
    }

    /* ===== FORMAT PACE (MM:SS) ===== */
    function formatPace(sec) {
      if (!isFinite(sec) || sec <= 0) return "--:--";

      const minutes = Math.floor(sec / 60);
      const seconds = Math.floor(sec % 60);

      return (
        String(minutes).padStart(2, "0") + ":" +
        String(seconds).padStart(2, "0")
      );
    }

    /* ===== GET TRACK DISTANCE ===== */
    function getTrackDistance() {
      return Number(trackSelect.value);
    }

    /* ===== CREATE ONE LAP ROW ===== */
    function createPaceRow(lap, trackDistance) {
      const totalDistance = lap * trackDistance;
      let paceText = "--:--";

      // Compute pace if timer is running
      if (elapsed > 0) {
        const distanceKm = totalDistance / 1000;
        const paceSeconds = elapsed / distanceKm;
        paceText = formatPace(paceSeconds);
      }

      const row = document.createElement("div");
      row.className = "paceRow";

      row.innerHTML = `
        <div class="paceLap">L${lap}</div>
        <div class="paceValue">${paceText}</div>
      `;

      return row;
    }

    /* ===== RENDER ALL LAPS ===== */
    function renderPaces() {
      const trackDistance = getTrackDistance();

      leftColumn.innerHTML = "";
      rightColumn.innerHTML = "";

      // Left column (laps 1–5)
      for (let lap = 1; lap <= 5; lap++) {
        leftColumn.appendChild(createPaceRow(lap, trackDistance));
      }

      // Right column (laps 6–10)
      for (let lap = 6; lap <= 10; lap++) {
        rightColumn.appendChild(createPaceRow(lap, trackDistance));
      }
    }

    /* ===== MAIN TIMER LOOP ===== */
    function runTimer() {
      if (!running) return;

      // Update elapsed time
      elapsed = (Date.now() - startTime) / 1000;

      // Update display
      const [main, dec] = formatTime(elapsed).split(".");
      mainTimeEl.textContent = main;
      decimalEl.textContent = "." + dec;

      // Update pace once per second (avoid flicker)
      const currentSecond = Math.floor(elapsed);
      if (currentSecond !== lastPaceUpdateSecond) {
        lastPaceUpdateSecond = currentSecond;
        renderPaces();
      }

      animationId = requestAnimationFrame(runTimer);
    }

    /* ===== BUTTONS ===== */

    // Start
    document.getElementById("start").onclick = () => {
      if (running) return;

      running = true;
      startTime = Date.now() - elapsed * 1000; // resume support
      runTimer();
    };

    // Stop
    document.getElementById("stop").onclick = () => {
      running = false;
      if (animationId) cancelAnimationFrame(animationId);
    };

    // Reset (and auto restart)
    document.getElementById("reset").onclick = () => {
      if (animationId) cancelAnimationFrame(animationId);

      elapsed = 0;
      startTime = Date.now();
      running = true;
      lastPaceUpdateSecond = -1;

      mainTimeEl.textContent = "00:00";
      decimalEl.textContent = ".00";

      renderPaces();
      runTimer();
    };

    /* ===== EVENTS ===== */

    // Update when track changes
    trackSelect.onchange = () => {
      renderPaces();
    };

    /* ===== INITIAL LOAD ===== */
    renderPaces();
  </script>

</body>
</html>
